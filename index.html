<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daedalus's Labyrinth</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <h1>Daedalus's Labyrinth</h1>
  </header>
  <main>
    <div id="toolbar">
      <div class="toolbar-group">
        <button id="btnUndo" title="Undo (Ctrl+Z)">Undo</button>
        <button id="btnRedo" title="Redo (Ctrl+Y)">Redo</button>
        <button id="btnReset">Reset</button>
        <button id="btnShowSolution">Show solution</button>
      </div>
      <div class="toolbar-group">
        <label for="genSize">Size:</label>
        <select id="genSize">
          <option value="4">4×4</option>
          <option value="5">5×5</option>
          <option value="6">6×6</option>
          <option value="7">7×7</option>
          <option value="8">8×8</option>
          <option value="9">9×9</option>
          <option value="10" selected>10×10</option>
          <option value="12">12×12</option>
          <option value="15">15×15</option>
        </select>
        <label for="genDiff">Difficulty:</label>
        <select id="genDiff">
          <option value="0" selected>Easy</option>
          <option value="1">Normal</option>
          <option value="2">Hard</option>
        </select>
        <button id="btnGenerate">Generate</button>
      </div>
    </div>
    <div id="canvasWrapper">
      <canvas id="gameCanvas"></canvas>
    </div>
    <div id="statusMsg"></div>
  </main>
  <script src="js/constants.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
